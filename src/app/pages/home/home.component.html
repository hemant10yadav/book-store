<section class="pb-5">
  <!-- New Arrivals Banner -->
  <div class="mt-4 d-none d-sm-block">
    <div *ngIf="loadingNewArrivals" class="d-flex gap-4 ms-3 overflow-hidden">
      <div *ngFor="let i of [1,2,3]" class="placeholder-glow flex-shrink-0">
        <div class="placeholder rounded" style="width: 700px; height: 290px;"></div>
      </div>
    </div>
    <app-hemant-slider *ngIf="!loadingNewArrivals && newArrivals.length" [width]="window.screen.width / 2">
      <ng-container *ngFor="let book of newArrivals; index as i">
        <app-new-arrival-widget [index]="i" [book]="book"></app-new-arrival-widget>
      </ng-container>
    </app-hemant-slider>
  </div>

  <!-- Browse by Age Group -->
  <div class="mt-0 mt-sm-5 gradient px-3">
    <app-hemant-slider>
      <div>
        <div class="title">Browse by Age Group</div>
        <div
          class="d-flex justify-content-between w-100"
          [ngStyle]="{ gap: getCalculatedValue('1rem', '3rem') }"
        >
          <ng-container *ngFor="let obj of ageGroup">
            <img
              draggable="false"
              alt="child image"
              class="mt-auto"
              [src]="obj.imageSrc"
              [height]="obj.height"
            />
            <div *ngFor="let age of obj.ageGroup" class="age-box d-flex mt-auto gap-3">
              <app-age-widget [lowerLimit]="age" [upperLimit]="age + 1"></app-age-widget>
            </div>
          </ng-container>
        </div>
      </div>
    </app-hemant-slider>
  </div>

  <!-- Browse by Genre -->
  <div class="section mt-5">
    <div class="title">Browse by Genre</div>
    <div class="d-flex flex-wrap gap-2 mt-3">
      <a
        *ngFor="let genre of genres"
        [routerLink]="['/genre', genre.slug]"
        class="genre-chip"
      >
        {{ genre.name }}
      </a>
    </div>
  </div>

  <!-- Top 10 Books -->
  <div class="section mt-5">
    <div class="title">Top 10 Books</div>
    <div *ngIf="loadingTopSeller" class="d-flex gap-3 ms-3 mt-2 overflow-hidden">
      <div *ngFor="let i of skeletonArray" class="placeholder-glow flex-shrink-0">
        <div class="placeholder rounded" style="width: 170px; height: 240px;"></div>
        <div class="placeholder rounded mt-2" style="width: 120px; height: 14px;"></div>
      </div>
    </div>
    <div *ngIf="errorTopSeller" class="ms-3 mt-2 text-muted">
      <i class="bi bi-exclamation-circle me-2"></i>Failed to load.
      <span class="clickable text-primary ms-2" (click)="getTopSellerBooks()">Retry</span>
    </div>
    <div *ngIf="!loadingTopSeller && !errorTopSeller">
      <app-hemant-slider
        [gap]="getCalculatedValue('1rem', '5rem')"
        [width]="window.screen.width / 2"
      >
        <ng-container *ngFor="let book of topSellerBooks; index as i">
          <app-book-widget
            [index]="getCalculatedValue(null, i + 1)"
            [book]="book"
          ></app-book-widget>
        </ng-container>
      </app-hemant-slider>
    </div>
  </div>

  <!-- Popular Series + Teachers Pick -->
  <div class="popularSeries mt-3">
    <div class="section pt-6">
      <div class="title text-white">Popular Series</div>
      <div *ngIf="loadingPopular" class="d-flex gap-3 ms-3 mt-5 overflow-hidden">
        <div *ngFor="let i of skeletonArray" class="placeholder-glow flex-shrink-0">
          <div class="placeholder rounded" style="width: 170px; height: 240px; opacity: 0.3;"></div>
        </div>
      </div>
      <div *ngIf="errorPopular" class="ms-3 mt-5 text-white-50">
        <i class="bi bi-exclamation-circle me-2"></i>Failed to load popular series.
      </div>
      <div *ngIf="!loadingPopular && !errorPopular" class="mt-5">
        <app-hemant-slider [gap]="getCalculatedValue('1rem', '3rem')">
          <ng-container *ngFor="let book of popularBooks">
            <app-popular-widget [book]="book" [mode]="'dark'"></app-popular-widget>
          </ng-container>
        </app-hemant-slider>
      </div>
    </div>

    <hr class="border border-1 border-white app-x-margin" />

    <div class="section mt-5">
      <div class="title text-white">Teachers Pick</div>
      <div *ngIf="loadingTeachersPick" class="d-flex gap-3 ms-3 mt-2 overflow-hidden">
        <div *ngFor="let i of skeletonArray" class="placeholder-glow flex-shrink-0">
          <div class="placeholder rounded" style="width: 170px; height: 240px; opacity: 0.3;"></div>
        </div>
      </div>
      <div *ngIf="errorTeachersPick" class="ms-3 mt-2 text-white-50">
        <i class="bi bi-exclamation-circle me-2"></i>Failed to load teachers pick.
      </div>
      <div *ngIf="!loadingTeachersPick && !errorTeachersPick" class="mt-2">
        <app-hemant-slider [gap]="getCalculatedValue('1rem', '2rem')">
          <ng-container *ngFor="let book of teachersPick">
            <app-book-widget [book]="book" [mode]="'dark'"></app-book-widget>
          </ng-container>
        </app-hemant-slider>
      </div>
    </div>
  </div>

  <!-- Must Read Sections -->
  <ng-container *ngFor="let section of mustReadSections">
    <div class="section mt-5">
      <div class="title">{{ section.label }}</div>
      <div *ngIf="section.loading" class="d-flex gap-3 ms-3 mt-2 overflow-hidden">
        <div *ngFor="let i of skeletonArray" class="placeholder-glow flex-shrink-0">
          <div class="placeholder rounded" style="width: 170px; height: 240px;"></div>
          <div class="placeholder rounded mt-2" style="width: 100px; height: 14px;"></div>
        </div>
      </div>
      <div *ngIf="!section.loading && section.error" class="ms-3 mt-2 text-muted">
        <i class="bi bi-exclamation-circle me-2"></i>Failed to load {{ section.label }}.
      </div>
      <div *ngIf="!section.loading && !section.error && section.books.length" class="mt-2">
        <app-hemant-slider [gap]="getCalculatedValue('1rem', '2rem')">
          <ng-container *ngFor="let book of section.books">
            <app-book-widget [book]="book"></app-book-widget>
          </ng-container>
        </app-hemant-slider>
      </div>
    </div>
  </ng-container>

  <!-- Recently Viewed -->
  <div *ngIf="recentlyViewedBooks.length" class="section mt-5">
    <div class="title">Recently Viewed</div>
    <div class="mt-2">
      <app-hemant-slider [gap]="getCalculatedValue('1rem', '2rem')">
        <ng-container *ngFor="let book of recentlyViewedBooks">
          <app-book-widget [book]="book"></app-book-widget>
        </ng-container>
      </app-hemant-slider>
    </div>
  </div>
</section>
<app-my-footer></app-my-footer>
