<section class="app-x-margin py-5">
  <!-- Back button -->
  <div class="mb-4 clickable d-inline-flex align-items-center gap-2" (click)="back()">
    <i class="bi bi-chevron-left fs-20"></i>
    <span class="fs-14 text-muted">Back</span>
  </div>

  <!-- Loading skeleton -->
  <div *ngIf="loading" class="row g-4">
    <div class="col-md-3 placeholder-glow">
      <div class="placeholder rounded w-100" style="height: 350px;"></div>
      <div class="placeholder rounded mt-3 w-100" style="height: 40px;"></div>
    </div>
    <div class="col-md-9 placeholder-glow">
      <div class="placeholder rounded mb-3" style="width: 60%; height: 40px;"></div>
      <div class="placeholder rounded mb-2" style="width: 40%; height: 20px;"></div>
      <div class="placeholder rounded mb-2 mt-3" style="width: 30%; height: 20px;"></div>
      <div class="placeholder rounded mt-4" style="width: 100%; height: 120px;"></div>
    </div>
  </div>

  <!-- Error state -->
  <div *ngIf="error" class="text-center py-5">
    <i class="bi bi-exclamation-circle fs-48 text-muted d-block"></i>
    <h4 class="mt-3">Book not found</h4>
    <button class="btn btn-primary mt-3" (click)="back()">Go Back</button>
  </div>

  <!-- Book detail -->
  <div *ngIf="!loading && !error && book" class="row g-4">
    <!-- Cover + actions -->
    <div class="col-md-3 col-lg-2">
      <img
        [src]="thumbnail"
        [alt]="book.volumeInfo?.title"
        class="rounded shadow"
        style="width: 100%; max-width: 280px; height: auto;"
      />
      <div class="mt-4 d-flex flex-column gap-2">
        <button
          class="bg-transparent blue w-100 mt-0"
          style="height: 40px; border: 2px solid #3b72ff; border-radius: 8px; cursor: pointer;"
          (click)="toggleWishlist()"
          type="button"
        >
          <i [class]="isWishlisted ? 'bi bi-heart-fill text-danger' : 'bi bi-heart'"></i>
          {{ isWishlisted ? 'Wishlisted' : 'Add to Wishlist' }}
        </button>
        <a
          *ngIf="book.volumeInfo?.previewLink"
          [href]="book.volumeInfo.previewLink"
          target="_blank"
          rel="noopener"
          class="btn btn-outline-primary"
        >
          <i class="bi bi-book me-2"></i>Read Preview
        </a>
      </div>
    </div>

    <!-- Info -->
    <div class="col-md-9 col-lg-10">
      <h1 class="fs-32 fw-700">{{ book.volumeInfo?.title }}</h1>
      <div *ngIf="book.volumeInfo?.authors?.length" class="text-muted fs-16 mt-1">
        by {{ book.volumeInfo.authors.join(', ') }}
      </div>

      <div class="mt-3">
        <app-rating
          [ratings]="book.volumeInfo?.averageRating?.toString() || ''"
          [user]="book.volumeInfo?.ratingsCount || 0"
        ></app-rating>
      </div>

      <div *ngIf="book.volumeInfo?.description" class="mt-4">
        <p class="fs-15 lh-base text-secondary">{{ book.volumeInfo.description }}</p>
      </div>

      <div class="mt-4 row g-3">
        <div *ngIf="book.volumeInfo?.publisher" class="col-6 col-md-4">
          <div class="fs-12 text-muted">Publisher</div>
          <div class="fs-14 fw-600">{{ book.volumeInfo.publisher }}</div>
        </div>
        <div *ngIf="book.volumeInfo?.publishedDate" class="col-6 col-md-4">
          <div class="fs-12 text-muted">Published</div>
          <div class="fs-14 fw-600">{{ book.volumeInfo.publishedDate }}</div>
        </div>
        <div *ngIf="book.volumeInfo?.pageCount" class="col-6 col-md-4">
          <div class="fs-12 text-muted">Pages</div>
          <div class="fs-14 fw-600">{{ book.volumeInfo.pageCount }}</div>
        </div>
        <div *ngIf="book.volumeInfo?.categories?.length" class="col-12">
          <div class="fs-12 text-muted">Categories</div>
          <div class="d-flex gap-2 flex-wrap mt-1">
            <span
              *ngFor="let cat of book.volumeInfo.categories"
              class="badge bg-lightBlue text-dark fs-12 p-2"
            >{{ cat }}</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
<app-my-footer></app-my-footer>
