<section class="app-x-margin py-5">
  <div class="d-flex align-items-center mb-4 gap-3">
    <h1 class="fs-32 fw-700 mb-0">
      <i class="bi bi-heart-fill text-danger me-2"></i>My Wishlist
    </h1>
    <span class="text-muted fs-14">({{ books.length }} {{ books.length === 1 ? 'book' : 'books' }})</span>
  </div>

  <!-- Empty state -->
  <div *ngIf="books.length === 0" class="text-center py-5">
    <i class="bi bi-heart fs-48 text-muted d-block"></i>
    <h5 class="mt-3 text-muted">Your wishlist is empty</h5>
    <a routerLink="/" class="btn btn-primary mt-3">Browse Books</a>
  </div>

  <!-- Book grid -->
  <div *ngIf="books.length > 0" class="row g-4">
    <div *ngFor="let book of books" class="col-6 col-sm-4 col-md-3 col-lg-2">
      <div class="wishlist-card clickable" [routerLink]="['/book', book.id]">
        <img
          [src]="getThumbnail(book)"
          [alt]="book.volumeInfo?.title"
          class="rounded w-100"
          style="height: 200px; object-fit: cover;"
        />
        <div class="mt-2">
          <div class="fs-14 fw-600 book-name">{{ book.volumeInfo?.title }}</div>
          <div class="fs-12 text-muted mt-1">{{ book.volumeInfo?.authors?.[0] }}</div>
        </div>
        <button
          class="btn btn-sm btn-outline-danger mt-2 w-100"
          (click)="remove(book, $event)"
          type="button"
        >
          <i class="bi bi-trash me-1"></i>Remove
        </button>
      </div>
    </div>
  </div>
</section>
<app-my-footer></app-my-footer>
